<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Bid Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f3f3f3;
}

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
}

.tree-summary {
  cursor: pointer;
  border: 2px solid #ddd;
}

.tree-summary.active {
  border-color: #222;
}

h2, h3, h4 {
  margin: 0 0 10px;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}

.checkbox-text {
  flex: 1;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  background: #222;
  color: white;
  border: none;
}

.total-box {
  background: #222;
  color: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Tree Bid Calculator</h2>

<div class="total-box" id="finalTotal">$0</div>

<div id="trees"></div>

<button onclick="addTree()">+ Add Tree</button>

<div class="card">
<h3>Fixed Add-Ons</h3>

<label class="checkbox-row">
<input type="checkbox" id="climber" onchange="calculate()">
<span class="checkbox-text">Two Climbers (+$600)</span>
</label>

<label class="checkbox-row">
<input type="checkbox" id="craneCheck" onchange="calculate()">
<span class="checkbox-text">Crane</span>
</label>
<input type="number" id="crane" value="1500" oninput="calculate()">

<label class="checkbox-row">
<input type="checkbox" id="excavatorCheck" onchange="calculate()">
<span class="checkbox-text">Mini Excavator</span>
</label>
<input type="number" id="excavator" value="700" oninput="calculate()">

<label>Manual Add ($)</label>
<input type="number" id="manual" value="0" oninput="calculate()">
</div>

<div class="card">
<h3>Minimum Job Price</h3>

<label class="checkbox-row">
<input type="checkbox" id="minimumCheck" checked onchange="calculate()">
<span class="checkbox-text">Apply Minimum</span>
</label>

<input type="number" id="minimumPrice" value="600" oninput="calculate()">
</div>

<div class="card">
<h3>Discounts</h3>

<label>No Haul-Off (%)</label>
<select id="nohaul" onchange="calculate()">
<option value="0" selected>0%</option>
<option value="10">10%</option>
<option value="12">12%</option>
<option value="15">15%</option>
</select>

<label>Cash (%)</label>
<select id="cash" onchange="calculate()">
<option value="0" selected>0%</option>
<option value="3">3%</option>
<option value="5">5%</option>
<option value="7">7%</option>
</select>

<label>Returning ($)</label>
<select id="returning" onchange="calculate()">
<option value="0" selected>$0</option>
<option value="50">$50</option>
<option value="100">$100</option>
<option value="150">$150</option>
</select>
</div>

<script>
let trees = [];
let activeTree = 0;

const sizeOptions = {
  450: "Small 6–12 in",
  800: "Medium 13–22 in",
  1400: "Large 23–32 in",
  1950: "XL 33+ in"
};

const canopyOptions = {
  1: "Light",
  1.1: "Medium",
  1.2: "Large",
  1.35: "XL"
};

const difficulties = [
{key:"rig",label:"Rigging Required",val:0.20},
{key:"struct",label:"Near Structure",val:0.15},
{key:"dead",label:"Dead/Brittle",val:0.15},
{key:"drop",label:"Poor Drop Zone",val:0.15},
{key:"access",label:"Bad Access",val:0.10},
{key:"slope",label:"Steep Terrain",val:0.10},
{key:"cleanup",label:"Heavy Cleanup",val:0.15}
];

function addTree(){
trees.push({size:1950,canopy:1,diff:[],cap:true,capVal:6000,total:0});
activeTree=trees.length-1;
render();
}

function render(){
let html="";
trees.forEach((t,i)=>{
calcTree(t);
let active=i===activeTree;

html+=`
<div class="card tree-summary ${active?"active":""}" onclick="activeTree=${i};render()">
Tree ${i+1} — $${Math.round(t.total)}
</div>`;

if(active){
html+=`
<div class="card">
<select onchange="upd(${i},'size',this.value)">
<option value="450">Small 6–12" - $450</option>
<option value="800">Medium 13–22" - $800</option>
<option value="1400">Large 23–32" - $1,400</option>
<option value="1950" selected>XL 33"+ - $1,950</option>
</select>

<select onchange="upd(${i},'canopy',this.value)">
<option value="1">Light</option>
<option value="1.1">Medium</option>
<option value="1.2">Large</option>
<option value="1.35">XL</option>
</select>

${difficulties.map(d=>`
<label class="checkbox-row">
<input type="checkbox" ${t.diff.includes(d.key)?"checked":""}
onchange="tog(${i},'${d.key}',this.checked)">
<span>${d.label} (+${d.val*100}%)</span>
</label>`).join("")}

<label class="checkbox-row">
<input type="checkbox" ${t.cap?"checked":""}
onchange="t.cap=this.checked;render()">
<span>Cap at $6000</span>
</label>

<input type="number" value="${t.capVal}" oninput="upd(${i},'capVal',this.value)">

<div>Tree: $${Math.round(t.total)}</div>
</div>`;
}
});

treesDiv.innerHTML=html;
calcTotal();
}

function upd(i,k,v){trees[i][k]=parseFloat(v);render();}
function tog(i,k,c){
if(c)trees[i].diff.push(k);
else trees[i].diff=trees[i].diff.filter(x=>x!==k);
render();
}

function calcTree(t){
let base=t.size*t.canopy;
let pct=t.diff.reduce((a,k)=>a+difficulties.find(d=>d.key===k).val,0);
let raw=base*(1+pct);
t.total=t.cap?Math.min(raw,t.capVal):raw;
}

function calcTotal(){
let tot=trees.reduce((sum,t)=>sum+t.total,0);

if(climber.checked)tot+=600;
if(craneCheck.checked)tot+=+crane.value;
if(excavatorCheck.checked)tot+=+excavator.value;

tot+=+manual.value;

tot*=1-nohaul.value/100;
tot*=1-cash.value/100;
tot-=+returning.value;

if(minimumCheck.checked && tot<minimumPrice.value){
tot=minimumPrice.value;
}

finalTotal.innerHTML="$"+Math.round(tot);
}

addTree();
</script>

</body>
</html>
