<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Bid Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f3f3f3;
  color: #222;
}

h2, h3, h4 { margin: 0 0 10px; }

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}

.tree-summary {
  cursor: pointer;
  border: 2px solid #ddd;
}

.tree-summary.active { border-color: #222; }

label {
  display: block;
  font-weight: bold;
  margin-top: 10px;
}

select,
input[type="number"] {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #bbb;
  border-radius: 8px;
  font-size: 16px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #eee;
  font-weight: normal;
  margin-top: 0;
}

.checkbox-row input {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.checkbox-text {
  flex: 1;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.remove-btn { background: #8b1e1e; }

.total-box {
  background: #222;
  color: white;
  padding: 16px;
  border-radius: 12px;
  margin: 12px 0 20px;
  text-align: center;
}

.total {
  font-size: 28px;
  font-weight: bold;
}

.small {
  font-size: 13px;
  color: #666;
  margin-top: 8px;
  line-height: 1.4;
}

.summary-line {
  font-weight: bold;
  font-size: 16px;
}

.summary-sub {
  color: #666;
  font-size: 13px;
  margin-top: 4px;
}
</style>
</head>

<body>

<h2>Tree Bid Calculator</h2>

<div class="total-box">
  <div class="total" id="finalTotal">$0</div>
</div>

<div id="trees"></div>

<button type="button" onclick="addTree()">+ Add Tree</button>

<div class="card">
  <h3>Fixed Add-Ons</h3>

  <label class="checkbox-row">
    <input type="checkbox" id="climber" onchange="calculate()">
    <span class="checkbox-text">Two Climbers (+$600)</span>
  </label>

  <label class="checkbox-row">
    <input type="checkbox" id="craneCheck" onchange="calculate()">
    <span class="checkbox-text">Crane</span>
  </label>
  <input type="number" id="crane" value="1500" oninput="calculate()">

  <label class="checkbox-row">
    <input type="checkbox" id="excavatorCheck" onchange="calculate()">
    <span class="checkbox-text">Mini Excavator</span>
  </label>
  <input type="number" id="excavator" value="700" oninput="calculate()">

  <label>Manual Add-On ($)</label>
  <input type="number" id="manual" value="0" oninput="calculate()">
</div>

<div class="card">
  <h3>Minimum Job Price</h3>

  <label class="checkbox-row">
    <input type="checkbox" id="minimumCheck" checked onchange="calculate()">
    <span class="checkbox-text">Apply Minimum Price</span>
  </label>

  <label>Minimum Amount ($)</label>
  <input type="number" id="minimumPrice" value="600" oninput="calculate()">
</div>

<div class="card">
  <h3>Discounts</h3>

  <label>No Haul-Off Discount (%)</label>
  <select id="nohaul" onchange="calculate()">
    <option value="0" selected>0%</option>
    <option value="10">10%</option>
    <option value="12">12%</option>
    <option value="15">15%</option>
    <option value="20">20%</option>
  </select>

  <label>Cash Discount (%)</label>
  <select id="cash" onchange="calculate()">
    <option value="0" selected>0%</option>
    <option value="3">3%</option>
    <option value="5">5%</option>
    <option value="7">7%</option>
    <option value="10">10%</option>
  </select>

  <label>Returning Customer Discount ($)</label>
  <select id="returning" onchange="calculate()">
    <option value="0" selected>$0</option>
    <option value="50">$50</option>
    <option value="100">$100</option>
    <option value="150">$150</option>
    <option value="200">$200</option>
  </select>

  <label>Multi-Tree Discount (%)</label>
  <select id="multiTreeDiscount" onchange="calculate()">
    <option value="0" selected>0%</option>
    <option value="3">3%</option>
    <option value="5">5%</option>
    <option value="7">7%</option>
    <option value="10">10%</option>
  </select>
</div>

<script>
let trees = [];
let activeTree = 0;

const sizeOptions = {
  450: "Small 6–12 in",
  800: "Medium 13–22 in",
  1400: "Large 23–32 in",
  1950: "XL 33+ in"
};

const canopyOptions = {
  1: "Light",
  1.1: "Medium",
  1.2: "Large",
  1.35: "XL"
};

const difficulties = [
  { key: "normalRigging", label: "Normal Rigging", value: 0.15 },
  { key: "technicalRigging", label: "Technical Rigging", value: 0.25 },
  { key: "structure", label: "Near Structure/Fence", value: 0.15 },
  { key: "dead", label: "Dead/Brittle", value: 0.15 },
  { key: "drop", label: "Poor Drop Zone", value: 0.15 },
  { key: "access", label: "Bad Access / Long Drag", value: 0.10 },
  { key: "slope", label: "Steep Terrain", value: 0.10 },
  { key: "cleanup", label: "Heavy Cleanup / Wood Volume", value: 0.15 }
];

function addTree() {
  trees.push({
    size: 1950,
    canopy: 1,
    difficulty: [],
    cap: true,
    customCap: 6000,
    total: 0,
    raw: 0
  });
  activeTree = trees.length - 1;
  render();
}

function render() {
  const container = document.getElementById("trees");
  container.innerHTML = "";

  trees.forEach((tree, i) => {
    calculateTree(tree);
    const isActive = i === activeTree;

    container.innerHTML += `
      <div class="card tree-summary ${isActive ? "active" : ""}" onclick="setActiveTree(${i})">
        <div class="summary-line">
          Tree ${i + 1} — ${sizeOptions[tree.size]} / ${canopyOptions[tree.canopy]} — $${Math.round(tree.total)}
        </div>
      </div>
    `;

    if (isActive) {
      container.innerHTML += `
        <div class="card">
          <label>Tree Size</label>
          <select onchange="updateTree(${i}, 'size', this.value)">
            <option value="450">Small 6–12" - $450</option>
            <option value="800">Medium 13–22" - $800</option>
            <option value="1400">Large 23–32" - $1,400</option>
            <option value="1950" selected>XL 33"+ - $1,950</option>
          </select>

          <label>Canopy</label>
          <select onchange="updateTree(${i}, 'canopy', this.value)">
            <option value="1">Light</option>
            <option value="1.1">Medium</option>
            <option value="1.2">Large</option>
            <option value="1.35">XL</option>
          </select>

          <h4>Difficulty</h4>
          ${difficulties.map(d=>`
          <label class="checkbox-row">
            <input type="checkbox" ${tree.difficulty.includes(d.key)?"checked":""}
            onchange="toggleDifficulty(${i},'${d.key}',this.checked)">
            <span>${d.label} (+${d.value*100}%)</span>
          </label>`).join("")}

        </div>
      `;
    }
  });

  calculate();
}

function updateTree(i,k,v){ trees[i][k]=Number(v); render(); }

function toggleDifficulty(i,k,c){
  if(c) trees[i].difficulty.push(k);
  else trees[i].difficulty = trees[i].difficulty.filter(x=>x!==k);
  render();
}

function setActiveTree(i){ activeTree=i; render(); }

function calculateTree(t){
  let base=t.size*t.canopy;
  let pct=t.difficulty.reduce((a,k)=>a+difficulties.find(d=>d.key===k).value,0);
  t.total=base*(1+pct);
  return t.total;
}

function calculate(){
  let total = trees.reduce((sum,t)=>sum+calculateTree(t),0);

  if(climber.checked) total+=600;
  if(craneCheck.checked) total+=+crane.value;
  if(excavatorCheck.checked) total+=+excavator.value;

  total+=+manual.value;

  total*=1-nohaul.value/100;
  total*=1-cash.value/100;
  total*=1-multiTreeDiscount.value/100;
  total-=+returning.value;

  if(minimumCheck.checked && total<minimumPrice.value) total=minimumPrice.value;

  finalTotal.innerHTML="$"+Math.round(total);
}

addTree();
</script>

</body>
</html>
