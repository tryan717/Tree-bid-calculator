<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Bid Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f3f3f3;
}

.card {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
}

.tree-summary {
  cursor: pointer;
  border: 2px solid #ddd;
}

.tree-summary.active {
  border-color: #222;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}

.checkbox-text {
  flex: 1;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  background: #222;
  color: white;
  border: none;
}

.total {
  font-size: 26px;
  text-align: center;
  padding: 15px;
  background: #222;
  color: white;
  border-radius: 12px;
  position: sticky;
  bottom: 0;
}

.warning {
  text-align: center;
  font-weight: bold;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.low { background: #ffd6d6; }
.mid { background: #fff3cd; }
.good { background: #d4edda; }
</style>
</head>

<body>

<h2>Tree Bid Calculator</h2>

<div id="warningBox"></div>

<div id="trees"></div>

<button onclick="addTree()">+ Add Tree</button>

<div class="card">
<h3>Fixed Add-Ons</h3>

<label class="checkbox-row">
<input type="checkbox" id="climber" onchange="calculate()">
<span class="checkbox-text">Two Climbers (+$600)</span>
</label>

<label class="checkbox-row">
<input type="checkbox" id="craneCheck" onchange="calculate()">
<span class="checkbox-text">Crane</span>
</label>
<input type="number" id="crane" value="1500" oninput="calculate()">

<label class="checkbox-row">
<input type="checkbox" id="excavatorCheck" onchange="calculate()">
<span class="checkbox-text">Mini Excavator</span>
</label>
<input type="number" id="excavator" value="700" oninput="calculate()">

<label>Manual Add ($)</label>
<input type="number" id="manual" value="0" oninput="calculate()">
</div>

<div class="card">
<h3>Discounts</h3>

<label>No Haul-Off (%)</label>
<select id="nohaul" onchange="calculate()">
<option value="0" selected>0%</option>
<option value="10">10%</option>
<option value="12">12%</option>
<option value="15">15%</option>
</select>

<label>Cash (%)</label>
<select id="cash" onchange="calculate()">
<option value="0" selected>0%</option>
<option value="3">3%</option>
<option value="5">5%</option>
<option value="7">7%</option>
</select>

<label>Returning ($)</label>
<select id="returning" onchange="calculate()">
<option value="0" selected>$0</option>
<option value="50">$50</option>
<option value="100">$100</option>
<option value="150">$150</option>
</select>
</div>

<div class="total" id="finalTotal">$0</div>

<script>
let trees = [];
let activeTree = 0;

const difficulties = [
{key:"rig",label:"Rigging Required",val:0.20},
{key:"struct",label:"Near Structure",val:0.15},
{key:"dead",label:"Dead/Brittle",val:0.15},
{key:"drop",label:"Poor Drop Zone",val:0.15},
{key:"access",label:"Bad Access",val:0.10},
{key:"slope",label:"Steep Terrain",val:0.10},
{key:"cleanup",label:"Heavy Cleanup",val:0.15}
];

function addTree(){
trees.push({
size:2300,
canopy:1,
diff:[],
cap:true,
capVal:6000,
total:0,
raw:0
});
activeTree=trees.length-1;
render();
}

function render(){
let html="";
trees.forEach((t,i)=>{
calcTree(t);
let active=i===activeTree;

html+=`
<div class="card tree-summary ${active?"active":""}" onclick="activeTree=${i};render()">
Tree ${i+1} — $${Math.round(t.total)}
</div>`;

if(active){
html+=`
<div class="card">
<select onchange="upd(${i},'size',this.value)">
<option value="550">Small</option>
<option value="950">Medium</option>
<option value="1600">Large</option>
<option value="2300" selected>XL</option>
</select>

<select onchange="upd(${i},'canopy',this.value)">
<option value="1">Light</option>
<option value="1.1">Med</option>
<option value="1.2">Large</option>
<option value="1.35">XL</option>
</select>

${difficulties.map(d=>`
<label class="checkbox-row">
<input type="checkbox" ${t.diff.includes(d.key)?"checked":""}
onchange="tog(${i},'${d.key}',this.checked)">
<span>${d.label} (+${d.val*100}%)</span>
</label>`).join("")}

<label class="checkbox-row">
<input type="checkbox" ${t.cap?"checked":""}
onchange="t.cap=this.checked;render()">
<span>Cap at $6000</span>
</label>

<input type="number" value="${t.capVal}" oninput="upd(${i},'capVal',this.value)">

<div>Tree: $${Math.round(t.total)} | Raw: $${Math.round(t.raw)}</div>
</div>`;
}
});

document.getElementById("trees").innerHTML=html;
calcTotal();
}

function upd(i,k,v){trees[i][k]=parseFloat(v);render();}
function tog(i,k,c){
if(c)trees[i].diff.push(k);
else trees[i].diff=trees[i].diff.filter(x=>x!==k);
render();
}

function calcTree(t){
let base=t.size*t.canopy;
let pct=t.diff.reduce((a,k)=>a+difficulties.find(d=>d.key===k).val,0);
let raw=base*(1+pct);
let final=t.cap?Math.min(raw,t.capVal):raw;
t.raw=raw;t.total=final;
}

function calcTotal(){
let tot=0;
trees.forEach(t=>tot+=t.total);

if(climber.checked)tot+=600;
if(craneCheck.checked)tot+=+crane.value;
if(excavatorCheck.checked)tot+=+excavator.value;

tot+=+manual.value;

tot*=1-nohaul.value/100;
tot*=1-cash.value/100;
tot-=+returning.value;

if(tot<0)tot=0;

finalTotal.innerHTML="$"+Math.round(tot);

let warn=document.getElementById("warningBox");

if(tot<2800){
warn.innerHTML="<div class='warning low'>⚠️ Below profitable day rate</div>";
}
else if(tot<3400){
warn.innerHTML="<div class='warning mid'>⚠️ Near minimum target</div>";
}
else{
warn.innerHTML="<div class='warning good'>✅ Strong profitable job</div>";
}
}

addTree();
</script>

</body>
</html>
